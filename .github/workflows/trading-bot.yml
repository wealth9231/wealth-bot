name: Gate.io Trading Bot

on:
  workflow_dispatch:  # 支持手动触发 + 腾讯元宝定时触发
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟运行一次（GitHub Actions原生定时，备用）

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 每次运行应在几分钟内完成

    steps:
      - name: 检出代码（强制最新版本）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，避免缓存旧代码
          clean: true      # 强制清理工作目录

      - name: 强制更新到最新代码（彻底避免缓存）
        run: |
          echo "强制同步 origin/main..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "当前commit:"
          git log --oneline -1
          echo "当前修改时间:"
          git log -1 --format=%ci

      - name: 显示当前commit（调试用）
        run: |
          git log --oneline -1
          echo "当前commit: $(git rev-parse HEAD)"

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行交易机器人
        env:
          GATEIO_API_KEY: ${{ secrets.GATEIO_API_KEY }}
          GATEIO_API_SECRET: ${{ secrets.GATEIO_API_SECRET }}
          # Telegram 配置使用代码中的默认值（已更新为 @GateWoBuy_bot）
          # 如需覆盖，请在 GitHub Secrets 中设置
          TELEGRAM_ENABLED: 'True'
        run: |
          python gate_trading_bot.py

      - name: 上传日志（失败时进行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-log
          path: trading_bot.log
